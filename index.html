<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="エリア分析">
  <title>世田谷区 エリア購買層分析</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ヘッダー -->
    <header id="header">
      <div class="header-inner">
        <div class="header-title">
          <span class="header-icon">📍</span>
          <div>
            <h1>世田谷区 エリア分析</h1>
            <p class="header-sub">購買層・消費傾向マップ</p>
          </div>
        </div>
        <div class="header-badge">β版</div>
      </div>
    </header>

    <!-- 検索バー -->
    <div id="search-bar">
      <div class="search-inner">
        <input type="text" id="search-input" placeholder="町名を検索（例：三軒茶屋、成城...）" autocomplete="off">
        <button id="search-btn">🔍</button>
      </div>
      <div id="search-suggestions"></div>
    </div>

    <!-- メインコンテンツ（地図全幅） -->
    <div id="main-content">

      <!-- 地図（全幅） -->
      <div id="map-container">
        <div id="map"></div>

        <!-- モード切替ボタン（地図上・左上） -->
        <div id="mode-buttons">
          <button class="mode-btn active" id="btn-point" onclick="setMode('point')">
            📍 ピンポイント
          </button>
          <button class="mode-btn" id="btn-area" onclick="setMode('area')">
            ✏️ 範囲検索
          </button>
        </div>

        <!-- ヒント -->
        <div id="map-hint">
          <span id="hint-text">📍 地図をクリックまたは町名を検索してください</span>
        </div>

        <!-- フリーハンド選択用SVGオーバーレイ -->
        <svg id="freehand-svg" xmlns="http://www.w3.org/2000/svg">
          <path id="freehand-path" fill="rgba(0,194,203,0.10)" stroke="#00c2cb" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" stroke-linecap="round" d=""/>
        </svg>
      </div>

      <!-- 結果パネル（右サイドバー / スマホ下部） -->
      <div id="result-panel">
        <!-- スマホ用ドラッグハンドル -->
        <div class="panel-handle" id="panel-handle"></div>

        <!-- パネルコントロールバー -->
        <div id="panel-top-bar">
          <div class="panel-ctrl-btns">
            <button class="panel-ctrl-btn" id="panel-minimize-btn" title="縮小">⬇ 縮小</button>
            <button class="panel-ctrl-btn" id="panel-expand-btn" title="展開">⬆ 展開</button>
          </div>
          <button class="panel-ctrl-btn" id="panel-new-search-btn" title="新しい検索">🔍 再検索</button>
        </div>

        <!-- 検索履歴（直近5件） -->
        <div id="search-history" class="hidden">
          <div class="history-label">最近の検索</div>
          <div class="history-list" id="history-list"></div>
        </div>

        <!-- 空状態 -->
        <div id="panel-empty">
          <div class="empty-icon">🗺️</div>
          <p>地図をクリックするか<br>町名を検索してください</p>
        </div>

        <!-- エリアヘッダー（選択後） -->
        <div id="area-header" class="hidden">
          <div class="area-title-row">
            <h2 id="area-name"></h2>
            <div id="income-badge"></div>
          </div>
          <div id="area-tags"></div>
          <div class="area-meta">
            <span id="area-pop"></span>
            <span id="area-age"></span>
          </div>
        </div>

        <!-- 複数エリア情報（範囲選択時） -->
        <div id="multi-area-info" class="hidden"></div>

        <!-- タブ（選択後） -->
        <div id="tabs" class="hidden">
          <button class="tab-btn active" data-tab="profile">購買層</button>
          <button class="tab-btn" data-tab="spending">支出傾向</button>
          <button class="tab-btn" data-tab="age">年齢分布</button>
        </div>

        <!-- 購買層タブ -->
        <div id="tab-profile" class="tab-content hidden">
          <div class="section-title">推定世帯年収</div>
          <div id="income-display" class="income-card"></div>

          <div class="section-title">主要年齢層</div>
          <div id="age-groups"></div>

          <div class="section-title">世帯構成</div>
          <div id="family-types"></div>

          <div class="section-title">年齢構成比</div>
          <div id="age-ratio-bars"></div>
        </div>

        <!-- 支出傾向タブ -->
        <div id="tab-spending" class="tab-content hidden">
          <div class="section-title">月間推定支出（世帯平均）</div>
          <div id="spending-cards"></div>
          <div class="data-note">※ 総務省「家計調査年報（2022年）」をベースに推計</div>
        </div>

        <!-- 年齢分布タブ -->
        <div id="tab-age" class="tab-content hidden">
          <div class="section-title">年齢分布（人口）</div>
          <div id="age-chart"></div>
          <div class="data-note">※ 令和2年国勢調査（東京都統計部）</div>
        </div>

      </div><!-- /#result-panel -->

    </div><!-- /#main-content -->

    <!-- ローディング -->
    <div id="loading" class="hidden">
      <div class="loading-inner">
        <div class="spinner"></div>
        <p>データを取得中...</p>
      </div>
    </div>

    <!-- エラー -->
    <div id="error-toast" class="hidden"></div>

  </div><!-- /#app -->

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
